<div class="exo-gallery">
  <div class="exo-track">
    {{ range $i, $slide := . }}
    <img class="exo-slide" src="{{ $slide.src | absURL }}" alt="{{ $slide.alt }}" loading="lazy">
    {{ end }}
  </div>
  <button type="button" class="exo-arrow exo-prev" aria-label="{{ T "gallery_prev" }}">&#10094;</button>
  <button type="button" class="exo-arrow exo-next" aria-label="{{ T "gallery_next" }}">&#10095;</button>
  <div class="exo-thumbs"></div>
  <div class="exo-lightbox" hidden>
    <span class="exo-lightbox-close" aria-hidden="true">&times;</span>
    <img class="exo-lightbox-img" src="" alt="">
  </div>
</div>
